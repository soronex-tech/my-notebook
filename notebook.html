<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>筆記本</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e4e2dc;
    --text: #1a1a18;
    --text-muted: #888680;
    --accent: #4a46d4;
    --accent-light: #eeedfe;
    --danger: #d84040;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1c;
      --border: #2e2e2a;
      --text: #e8e6e0;
      --text-muted: #666460;
      --accent: #7b78f0;
      --accent-light: #26215c;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── 頂部列 ── */
  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .app-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px; border: none;
    background: transparent; cursor: pointer; display: flex;
    align-items: center; justify-content: center; color: var(--text-muted);
    transition: background .15s;
  }
  .icon-btn:hover { background: var(--bg); }
  .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* ── 搜尋列 ── */
  .search-bar {
    padding: 10px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: var(--text-muted); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; pointer-events: none;
  }
  .search-input {
    width: 100%; padding: 8px 10px 8px 34px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; color: var(--text);
    font-family: var(--font); outline: none; transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* ── 筆記列表 ── */
  .notes-list {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .note-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    cursor: pointer; transition: border-color .15s, transform .1s;
    position: relative;
  }
  .note-card:hover { border-color: var(--accent); }
  .note-card:active { transform: scale(0.99); }
  .note-card.selected { border-color: var(--accent); }
  .note-title {
    font-size: 15px; font-weight: 600; color: var(--text);
    margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .note-preview {
    font-size: 13px; color: var(--text-muted); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .note-meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px; font-size: 11px; color: var(--text-muted);
  }
  .note-has-media {
    display: inline-flex; align-items: center; gap: 3px;
  }
  .note-has-media svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .highlight { background: #fef08a; color: #713f12; border-radius: 2px; padding: 0 1px; }
  @media (prefers-color-scheme: dark) { .highlight { background: #713f12; color: #fef08a; } }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty-state p:first-child { font-size: 15px; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 13px; }

  /* ── 新增按鈕 ── */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(74,70,212,.35); transition: transform .15s, box-shadow .15s;
    z-index: 10;
  }
  .fab:hover { transform: scale(1.06); box-shadow: 0 4px 20px rgba(74,70,212,.45); }
  .fab:active { transform: scale(0.97); }
  .fab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ── 編輯器面板 ── */
  .editor-panel {
    position: fixed; inset: 0; background: var(--surface);
    display: flex; flex-direction: column; z-index: 100;
    transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .editor-panel.open { transform: translateX(0); }
  .editor-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .editor-topbar .back-btn {
    display: flex; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 15px; font-family: var(--font); padding: 0;
  }
  .editor-topbar .back-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .editor-actions { margin-left: auto; display: flex; gap: 6px; }
  .btn-save { color: var(--accent) !important; }
  .btn-delete { color: var(--danger) !important; }
  .title-input {
    width: 100%; padding: 16px 16px 8px;
    font-size: 20px; font-weight: 700; color: var(--text);
    font-family: var(--font); border: none; background: transparent; outline: none;
  }
  .title-input::placeholder { color: var(--text-muted); font-weight: 400; }
  /* ── TipTap 編輯區 ── */
  .tiptap-wrap {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 2px;
    padding: 6px 12px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: var(--surface);
  }
  .tb-btn {
    width: 30px; height: 30px; border-radius: 6px; border: none;
    background: transparent; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 13px; font-weight: 600;
    font-family: var(--font); transition: background .12s, color .12s;
    flex-shrink: 0;
  }
  .tb-btn:hover { background: var(--bg); color: var(--text); }
  .tb-btn.active { background: var(--accent-light); color: var(--accent); }
  .tb-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tb-sep { width: 1px; height: 22px; background: var(--border); margin: 0 3px; flex-shrink: 0; align-self: center; }
  .tb-color { width: 30px; height: 30px; padding: 0; border: none; border-radius: 6px; cursor: pointer; background: transparent; }
  .tb-color input[type=color] { width: 24px; height: 24px; border: none; border-radius: 4px; cursor: pointer; padding: 0; background: none; }
  .tb-select {
    height: 28px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); font-size: 12px;
    padding: 0 4px; cursor: pointer; outline: none;
  }
  #editor {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    font-size: 15px; color: var(--text); line-height: 1.7;
  }
  .ProseMirror { outline: none; min-height: 100%; }
  .ProseMirror p.is-editor-empty:first-child::before {
    content: attr(data-placeholder);
    color: var(--text-muted); pointer-events: none; float: left; height: 0;
  }
  .ProseMirror h1 { font-size: 22px; font-weight: 700; margin: 12px 0 6px; }
  .ProseMirror h2 { font-size: 18px; font-weight: 600; margin: 10px 0 5px; }
  .ProseMirror h3 { font-size: 16px; font-weight: 600; margin: 8px 0 4px; }
  .ProseMirror ul, .ProseMirror ol { padding-left: 22px; margin: 6px 0; }
  .ProseMirror li { margin: 2px 0; }
  .ProseMirror blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: 8px 0; }
  .ProseMirror code { background: var(--bg); border-radius: 4px; padding: 1px 5px; font-size: 13px; }
  .ProseMirror pre { background: var(--bg); border-radius: 8px; padding: 12px; overflow-x: auto; }
  .ProseMirror table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .ProseMirror td, .ProseMirror th { border: 1px solid var(--border); padding: 6px 10px; min-width: 60px; }
  .ProseMirror th { background: var(--bg); font-weight: 600; }
  .ProseMirror .selectedCell { background: var(--accent-light); }
  .ProseMirror hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* ── 媒體預覽區 ── */
  .media-strip {
    padding: 0 16px 12px; display: flex; gap: 8px;
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  .media-strip::-webkit-scrollbar { display: none; }
  .media-thumb {
    flex-shrink: 0; width: 80px; height: 80px; border-radius: 8px;
    object-fit: cover; border: 1px solid var(--border); cursor: pointer; background: var(--bg);
  }
  .media-thumb-video {
    position: relative; width: 80px; height: 80px; flex-shrink: 0; cursor: pointer;
  }
  .media-thumb-video video {
    width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--border);
  }
  .media-thumb-video::after {
    content: ''; position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.3); border-radius: 8px;
  }
  .play-icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 28px; height: 28px; background: rgba(255,255,255,.9); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; pointer-events: none;
  }
  .play-icon::after { content: ''; border-left: 9px solid #333; border-top: 5px solid transparent; border-bottom: 5px solid transparent; margin-left: 2px; }

  /* ── 媒體工具列 ── */
  .media-toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .media-toolbar .icon-btn { color: var(--text-muted); }
  .char-count { margin-left: auto; font-size: 12px; color: var(--text-muted); }
  #file-input { display: none; }

  /* ── 媒體燈箱 ── */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img, .lightbox video {
    max-width: 95vw; max-height: 90dvh; border-radius: 8px; object-fit: contain;
  }
  .lightbox-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,.15); border: none; color: #fff;
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }

  /* ── 同步狀態 ── */
  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; display: inline-block; margin-left: 4px;
    transition: background .3s;
  }
  .sync-dot.syncing { background: #f59e0b; animation: pulse .8s ease-in-out infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Toast ── */
  /* ── 表格設定 Modal ── */
  .table-modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 400; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .table-modal-bg.open { opacity: 1; pointer-events: all; }
  .table-modal {
    background: var(--surface); border-radius: 14px;
    padding: 24px; width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .table-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .table-modal label { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 4px; }
  .table-modal input[type=number] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; color: var(--text);
    background: var(--bg); outline: none; margin-bottom: 14px;
    font-family: var(--font);
  }
  .table-modal input[type=number]:focus { border-color: var(--accent); }
  .table-modal-footer { display: flex; gap: 8px; margin-top: 4px; }
  .table-modal-footer button {
    flex: 1; padding: 9px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font);
  }
  .btn-cancel-modal { background: var(--bg); color: var(--text-muted); }
  .btn-confirm-modal { background: var(--accent); color: #fff; }

  /* ── 表格右鍵選單 ── */
  .ctx-menu {
    position: fixed; z-index: 500;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
    min-width: 180px;
    opacity: 0; pointer-events: none; transform: scale(.95);
    transition: opacity .12s, transform .12s;
  }
  .ctx-menu.open { opacity: 1; pointer-events: all; transform: scale(1); }
  .ctx-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    font-size: 13px; color: var(--text);
    transition: background .1s;
  }
  .ctx-item:hover { background: var(--bg); }
  .ctx-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .ctx-item.danger { color: var(--danger); }
  .ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a1a18; color: #fff; padding: 10px 18px;
    border-radius: 20px; font-size: 13px; opacity: 0;
    transition: opacity .2s, transform .2s; pointer-events: none; z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── 儲存遮罩 ── */
  .save-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(2px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity .2s;
    border-radius: 0;
  }
  .save-overlay.show { opacity: 1; pointer-events: all; }
  .save-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: 12px;
  }
  .save-label {
    color: #fff; font-size: 14px; font-weight: 500; letter-spacing: .02em;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<!-- TipTap via esm.sh，直接完整 URL，不用 importmap -->
<script type="module">
import { Editor } from 'https://esm.sh/@tiptap/core@2.4.0?bundle';
import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.4.0?bundle';
import { TextStyle } from 'https://esm.sh/@tiptap/extension-text-style@2.4.0?bundle';
import { Color } from 'https://esm.sh/@tiptap/extension-color@2.4.0?bundle';
import { Table } from 'https://esm.sh/@tiptap/extension-table@2.4.0?bundle';
import { TableRow } from 'https://esm.sh/@tiptap/extension-table-row@2.4.0?bundle';
import { TableHeader } from 'https://esm.sh/@tiptap/extension-table-header@2.4.0?bundle';
import { TableCell } from 'https://esm.sh/@tiptap/extension-table-cell@2.4.0?bundle';

window._tiptapModules = { Editor, StarterKit, TextStyle, Color, Table, TableRow, TableHeader, TableCell };
window._tiptapReady = true;
console.log('[TipTap] 載入完成');
</script>
</head>
<body>

<!-- 頂部列 -->
<div class="topbar">
  <span class="app-title">筆記本</span>
  <span class="sync-dot" id="syncDot" title="同步狀態"></span>
  <button class="icon-btn" id="syncBtn" title="同步 Google Drive" onclick="handleSyncBtn()">
    <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
  </button>
</div>

<!-- 搜尋列 -->
<div class="search-bar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="search" placeholder="搜尋筆記…" oninput="onSearch(this.value)">
  </div>
</div>

<!-- 筆記列表 -->
<div class="notes-list" id="notesList"></div>

<!-- 新增按鈕 -->
<button class="fab" onclick="openEditor(null)" title="新增筆記">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- 編輯器面板 -->
<div class="editor-panel" id="editorPanel">
  <div class="editor-topbar">
    <button class="back-btn" onclick="closeEditor()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <div class="editor-actions">
      <button class="icon-btn btn-save" id="saveBtn" onclick="saveNote()" title="儲存並同步">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button class="icon-btn btn-delete" id="deleteBtn" onclick="deleteNote()" title="刪除">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </div>
  <input class="title-input" id="titleInput" type="text" placeholder="標題">
  <div class="tiptap-wrap">
    <div class="toolbar" id="toolbar">
      <!-- 標題 -->
      <select class="tb-select" id="headingSelect" onchange="setHeading(this.value)">
        <option value="0">內文</option>
        <option value="1">標題 1</option>
        <option value="2">標題 2</option>
        <option value="3">標題 3</option>
      </select>
      <div class="tb-sep"></div>
      <!-- 文字格式 -->
      <button class="tb-btn" id="btn-bold" onclick="editor.chain().focus().toggleBold().run()" title="粗體"><svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
      <button class="tb-btn" id="btn-italic" onclick="editor.chain().focus().toggleItalic().run()" title="斜體"><svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
      <button class="tb-btn" id="btn-underline" onclick="editor.chain().focus().toggleStrike().run()" title="刪除線"><svg viewBox="0 0 24 24"><line x1="18" y1="12" x2="6" y2="12"/><path d="M16 6C16 6 14 4 12 4C10 4 8 5.5 8 7.5C8 9.5 10 10.5 12 11"/><path d="M8 18C8 18 10 20 12 20C14 20 16 18.5 16 16.5"/></svg></button>
      <div class="tb-sep"></div>
      <!-- 文字顏色 -->
      <div class="tb-color" title="文字顏色">
        <input type="color" id="colorPicker" value="#e85d3a" onchange="editor.chain().focus().setColor(this.value).run()">
      </div>
      <div class="tb-sep"></div>
      <!-- 清單 -->
      <button class="tb-btn" id="btn-bulletList" onclick="editor.chain().focus().toggleBulletList().run()" title="項目符號">
        <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="tb-btn" id="btn-orderedList" onclick="editor.chain().focus().toggleOrderedList().run()" title="編號清單">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── 資料模型 ──
let notes = [];
let editor = null;  // TipTap 實例
let currentNoteId = null;
let searchQuery = '';
let saveTimer = null;
let driveConnected = false;
let baselineTimes = {};   // 每則筆記開啟時的基準 updatedAt
let originalNote = null;  // 點開筆記時的原始內容，用於放棄修改
let noteDirty = false;    // 是否有未儲存的修改
let pollTimer = null;     // 定時檢查 timer


// ── 本地儲存 ──
function loadLocal() {
  try {
    const raw = localStorage.getItem('notebook_notes');
    notes = raw ? JSON.parse(raw) : [];
  } catch { notes = []; }
}

function saveLocal() {
  try { localStorage.setItem('notebook_notes', JSON.stringify(notes)); } catch {}
}

// ── 工具 ──
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmtDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '剛才';
  if (diff < 3600000) return Math.floor(diff/60000) + ' 分鐘前';
  if (diff < 86400000) return Math.floor(diff/3600000) + ' 小時前';
  const mm = d.getMonth()+1, dd = d.getDate();
  if (d.getFullYear() === now.getFullYear()) return mm+'/'+dd;
  return d.getFullYear()+'/'+mm+'/'+dd;
}

function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  dot.title = state === 'syncing' ? '同步中…' : state === 'error' ? '同步失敗' : '已同步';
}

function showSaving(label = '儲存中…') {
  document.getElementById('saveLabel').textContent = label;
  document.getElementById('saveOverlay').classList.add('show');
}

function hideSaving() {
  document.getElementById('saveOverlay').classList.remove('show');
}

// ── 搜尋（substring） ──
function highlightMatch(text, q) {
  if (!q) return escHtml(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx))
    + '<mark class="highlight">' + escHtml(text.slice(idx, idx+q.length)) + '</mark>'
    + escHtml(text.slice(idx+q.length));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
}

function filteredNotes() {
  const active = notes.filter(n => !n.deleted);
  if (!searchQuery) return active.sort((a,b) => b.updatedAt - a.updatedAt);
  const q = searchQuery.toLowerCase();
  return active
    .filter(n => n.title.toLowerCase().includes(q) || stripHtml(n.body).toLowerCase().includes(q))
    .sort((a,b) => b.updatedAt - a.updatedAt);
}

function onSearch(val) {
  searchQuery = val;
  renderList();
}

// ── 渲染列表 ──
function renderList() {
  const list = document.getElementById('notesList');
  const filtered = filteredNotes();
  if (filtered.length === 0) {
    list.innerHTML = searchQuery
      ? `<div class="empty-state"><p>沒有符合的筆記</p><p>試試其他關鍵字</p></div>`
      : `<div class="empty-state"><p>還沒有筆記</p><p>點右下角 + 開始記錄</p></div>`;
    return;
  }
  const q = searchQuery;
  list.innerHTML = filtered.map(n => {
    const hasImg = n.media && n.media.some(m => m.type.startsWith('image'));
    const hasVid = n.media && n.media.some(m => m.type.startsWith('video'));
    const preview = stripHtml(n.body).slice(0, 120);
    return `<div class="note-card" onclick="openEditor('${n.id}')">
      <div class="note-title">${highlightMatch(n.title || '（無標題）', q)}</div>
      <div class="note-preview">${highlightMatch(preview, q)}</div>
      <div class="note-meta">
        <span>${fmtDate(n.updatedAt)}</span>
        ${hasImg ? `<span class="note-has-media"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span>` : ''}
        ${hasVid ? `<span class="note-has-media"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── 編輯器 ──
function openEditor(id) {
  currentNoteId = id;
  noteDirty = false;
  const panel = document.getElementById('editorPanel');
  const titleInput = document.getElementById('titleInput');
  const deleteBtn = document.getElementById('deleteBtn');

  if (id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    titleInput.value = note.title;
    if (editor) editor.commands.setContent(note.body || '');
    renderMediaStrip(note.media || []);
    deleteBtn.style.display = '';
    baselineTimes[id] = note.updatedAt;
    originalNote = { title: note.title, body: note.body || '', media: [...(note.media || [])] };
  } else {
    titleInput.value = '';
    if (editor) editor.commands.setContent('');
    renderMediaStrip([]);
    deleteBtn.style.display = 'none';
    originalNote = null;
  }
  updateCharCount();
  panel.classList.add('open');
  setTimeout(() => { if (!titleInput.value) titleInput.focus(); else editor && editor.commands.focus(); }, 300);
}

function closeEditor() {
  if (noteDirty) {
    const leave = confirm('你有未儲存的修改，確定要離開嗎？\n\n確定 → 放棄修改，離開\n取消 → 回到編輯畫面');
    if (!leave) return;
    // 放棄修改：還原原始內容
    if (currentNoteId && originalNote) {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        note.title = originalNote.title;
        note.body = originalNote.body;
        note.media = originalNote.media;
        saveLocal();
      }
    } else if (!currentNoteId) {
      // 新增筆記中途放棄，從 notes 移除
      const titleInput = document.getElementById('titleInput');
      const body = editor ? editor.getHTML() : '';
      if (!titleInput.value.trim() && (!body || body === '<p></p>')) {
        // 空的直接關
      }
    }
  }
  document.getElementById('editorPanel').classList.remove('open');
  currentNoteId = null;
  originalNote = null;
  noteDirty = false;
  renderList();
}

function autoSave() {
  const title = document.getElementById('titleInput').value.trim();
  const body = editor ? editor.getHTML() : '';
  const bodyText = editor ? editor.getText() : '';

  if (originalNote !== null) {
    noteDirty = (title !== originalNote.title || body !== originalNote.body);
  } else {
    noteDirty = !!(title || bodyText);
  }

  if (!title && !bodyText) return;
  if (currentNoteId) {
    const note = notes.find(n => n.id === currentNoteId);
    if (note) { note.title = title; note.body = body; }
  }
}

function deleteNote() {
  if (!currentNoteId) return;
  if (!confirm('確定要刪除這則筆記嗎？')) return;
  const note = notes.find(n => n.id === currentNoteId);
  if (note) {
    note.deleted = true;
    note.updatedAt = Date.now();
    saveLocal();
    if (driveConnected) pushToDrive();
  }
  document.getElementById('editorPanel').classList.remove('open');
  currentNoteId = null;
  renderList();
  showToast('已刪除');
}

// ── 自動儲存（300ms debounce）──
document.getElementById('titleInput').addEventListener('input', debounceSave);

function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, 300);
}

function updateCharCount() {
  const len = editor ? editor.getText().length : 0;
  document.getElementById('charCount').textContent = len + ' 字';
}

// ── 媒體處理 ──
function handleFileInput(input) {
  const files = Array.from(input.files);
  if (!currentNoteId) autoSave();
  const note = notes.find(n => n.id === currentNoteId);
  if (!note) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const mediaItem = { id: genId(), type: file.type, name: file.name, data: e.target.result };
      if (!note.media) note.media = [];
      note.media.push(mediaItem);
      loaded++;
      if (loaded === files.length) {
        note.updatedAt = Date.now();
        saveLocal();
        renderMediaStrip(note.media);
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderMediaStrip(mediaItems) {
  const strip = document.getElementById('mediaStrip');
  if (!mediaItems || mediaItems.length === 0) { strip.innerHTML = ''; return; }
  strip.innerHTML = mediaItems.map((m, i) => {
    if (m.type.startsWith('image')) {
      return `<img class="media-thumb" src="${m.data}" onclick="openLightbox(${i})" title="${escHtml(m.name)}" loading="lazy">`;
    } else if (m.type.startsWith('video')) {
      return `<div class="media-thumb-video" onclick="openLightbox(${i})">
        <video src="${m.data}" muted playsinline preload="metadata"></video>
        <div class="play-icon"></div>
      </div>`;
    }
    return '';
  }).join('');
}

function openLightbox(idx) {
  const note = notes.find(n => n.id === currentNoteId);
  if (!note || !note.media[idx]) return;
  const m = note.media[idx];
  const lb = document.getElementById('lightbox');
  const content = document.getElementById('lightboxContent');
  if (m.type.startsWith('image')) {
    content.innerHTML = `<img src="${m.data}" alt="${escHtml(m.name)}">`;
  } else {
    content.innerHTML = `<video src="${m.data}" controls autoplay playsinline style="max-width:95vw;max-height:85dvh;border-radius:8px"></video>`;
  }
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxContent').innerHTML = '';
}

// ── Google Drive 同步 ──
const DRIVE_FILE_NAME = 'notebook_data.json';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
let tokenClient = null;
let accessToken = null;
let driveFileId = localStorage.getItem('notebook_drive_file_id') || null;

// ── 單一同步按鈕入口 ──
async function handleSyncBtn() {
  if (!driveConnected) {
    await connectDrive();
  } else {
    await pullAndMerge();
  }
}

// ── 載入 GSI ──
function loadGSI() {
  return new Promise((resolve, reject) => {
    if (window.google && window.google.accounts) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ── 授權 ──

// 初始化 tokenClient（只做一次）
async function initTokenClient() {
  await loadGSI();
  if (tokenClient) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: '859465746094-ed5q19s7hh6kh2hkqi2cjg4es2c0j8kv.apps.googleusercontent.com',
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        console.warn('Auth callback error:', resp.error);
        setSyncState('error');
        return;
      }
      accessToken = resp.access_token;
      driveConnected = true;
      startPolling();
    }
  });
}

// 強制跳視窗授權
function connectDrive() {
  return new Promise(async (resolve) => {
    try { await initTokenClient(); } catch(e) {
      showToast('載入失敗，請重試'); setSyncState('error'); resolve(false); return;
    }
    const original = tokenClient.callback;
    tokenClient.callback = async (resp) => {
      tokenClient.callback = original;
      if (resp.error) { showToast('授權失敗：' + resp.error); setSyncState('error'); resolve(false); return; }
      accessToken = resp.access_token;
      driveConnected = true;
      showToast('已連結 Google Drive');
      await pullAndMerge();
      startPolling();
      resolve(true);
    };
    tokenClient.requestAccessToken({ prompt: 'consent' });
  });
}

// 401 時自動重新授權後重試
async function withAutoReauth(fn) {
  try {
    return await fn();
  } catch(e) {
    if (e.message && e.message.includes('401')) {
      showToast('登入已過期，請重新授權');
      await connectDrive();
      return await fn();
    }
    throw e;
  }
}

// ── REST API 工具 ──
async function driveGetJSON(path, params = {}) {
  const url = new URL('https://www.googleapis.com/drive/v3/' + path);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } });
  if (res.status === 401) throw new Error('401 Token expired');
  if (!res.ok) throw new Error('Drive GET failed: ' + res.status + ' ' + await res.text());
  return res.json();
}

async function driveGetMedia(fileId) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { 'Authorization': 'Bearer ' + accessToken } }
  );
  if (res.status === 401) throw new Error('401 Token expired');
  if (!res.ok) throw new Error('Drive media GET failed: ' + res.status);
  return res.text();
}

// ── 找或建立 Drive 檔案 ID ──
async function ensureFileId() {
  if (driveFileId) return;
  const result = await driveGetJSON('files', {
    spaces: 'drive',
    q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
    fields: 'files(id)',
    pageSize: '1'
  });
  if (result.files && result.files.length > 0) {
    driveFileId = result.files[0].id;
    localStorage.setItem('notebook_drive_file_id', driveFileId);
  }
}

// ── 從 Drive 拉取並逐則合併 ──
async function pullAndMerge() {
  if (!driveConnected) return;
  return withAutoReauth(_pullAndMerge);
}

async function _pullAndMerge() {
  setSyncState('syncing');
  try {
    await ensureFileId();
    if (!driveFileId) {
      // Drive 上還沒有檔案，直接推上去建立
      await pushToDrive();
      return;
    }
    const raw = await driveGetMedia(driveFileId);
    const remote = JSON.parse(raw);

    // 逐則比較：只更新比 local 新的那則
    let changed = false;
    const remoteIds = new Set(remote.map(n => n.id));

    // 1. Drive 有的筆記：新增或更新到本地
    remote.forEach(remoteNote => {
      const localIdx = notes.findIndex(n => n.id === remoteNote.id);
      if (localIdx === -1) {
        // Drive 有但本地沒有（其他裝置新增的）
        notes.push(remoteNote);
        changed = true;
      } else if (remoteNote.updatedAt > notes[localIdx].updatedAt) {
        // Drive 比較新，用 Drive 的覆蓋
        Object.assign(notes[localIdx], remoteNote);
        baselineTimes[notes[localIdx].id] = notes[localIdx].updatedAt;
        changed = true;
      }
      // 本地比較新或一樣新：不動
    });

    // 2. 本地有但 Drive 沒有的筆記：代表其他裝置刪掉了，本地也移除
    const before = notes.length;
    notes = notes.filter(n => remoteIds.has(n.id));
    if (notes.length !== before) changed = true;

    if (changed) { saveLocal(); renderList(); }
    setSyncState('ok');
  } catch(e) {
    setSyncState('error');
    showToast('同步失敗：' + e.message);
    console.error('pullAndMerge error:', e);
  }
}

// ── 推送到 Drive（整包覆蓋）──
async function pushToDrive() {
  if (!driveConnected) return;
  return withAutoReauth(_pushToDrive);
}

async function _pushToDrive() {
  setSyncState('syncing');
  try {
    await ensureFileId();
    // 推上去前過濾掉已刪除的筆記，Drive 上只保留真正存在的
    const data = JSON.stringify(notes.filter(n => !n.deleted));

    if (driveFileId) {
      const res = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
        {
          method: 'PATCH',
          headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
          body: data
        }
      );
      if (!res.ok) {
        if (res.status === 404) {
          driveFileId = null;
          localStorage.removeItem('notebook_drive_file_id');
          showToast('Drive 檔案不存在，請再試一次');
          setSyncState('error'); return;
        }
        throw new Error('PATCH failed: ' + res.status + ' ' + await res.text());
      }
    } else {
      const boundary = 'nb_' + Date.now();
      const meta = JSON.stringify({ name: DRIVE_FILE_NAME, parents: [] });
      const body = [
        `--${boundary}`,
        'Content-Type: application/json; charset=UTF-8', '', meta,
        `--${boundary}`,
        'Content-Type: application/json', '', data,
        `--${boundary}--`
      ].join('\r\n');
      const res = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': `multipart/related; boundary=${boundary}` },
          body
        }
      );
      if (!res.ok) throw new Error('POST failed: ' + res.status + ' ' + await res.text());
      const json = await res.json();
      if (!json.id) throw new Error('No file ID returned');
      driveFileId = json.id;
      localStorage.setItem('notebook_drive_file_id', driveFileId);
    }
    setSyncState('ok');
  } catch(e) {
    setSyncState('error');
    showToast('上傳失敗：' + e.message);
    console.error('pushToDrive error:', e);
  }
}

// ── 儲存按鈕：比較 baseline，衝突時警告 ──
async function saveNote() {
  const title = document.getElementById('titleInput').value.trim();
  const body = editor ? editor.getHTML() : '';
  const bodyText = editor ? editor.getText().trim() : '';
  if (!title && !bodyText) { showToast('筆記是空的'); return; }

  const now = Date.now();

  // 如果沒有連線 Drive，直接存本地就好
  if (!driveConnected) {
    commitSaveLocal(title, body, now);
    showToast('已儲存（未連線 Drive）');
    exitEditor();
    return;
  }

  // 有連線：先去 Drive 比較 baseline，再決定怎麼處理
  showSaving('確認雲端版本…');
  setSyncState('syncing');
  try {
    await ensureFileId();

    let conflict = false;
    if (driveFileId && currentNoteId) {
      const raw = await driveGetMedia(driveFileId);
      const remote = JSON.parse(raw);
      const remoteNote = remote.find(n => n.id === currentNoteId);
      const baseline = baselineTimes[currentNoteId] || 0;
      // 雲端時間 > 點開筆記時記錄的 baseline → 有衝突
      if (remoteNote && remoteNote.updatedAt > baseline) conflict = true;
    }

    if (conflict) {
      hideSaving();  // 先收起遮罩，讓 confirm 跳出來
      // 三選一：用原生 confirm 兩次模擬三選項
      const overwrite = confirm(
        '⚠️ 此筆記在你編輯期間已被更新。\n\n' +
        '按「確定」→ 覆蓋雲端版本\n' +
        '按「取消」→ 進入下一步選擇'
      );
      if (overwrite) {
        // 選擇覆蓋
        commitSaveLocal(title, body, now);
        showSaving('上傳中…');
        await pushToDrive();
        hideSaving();
        showToast('已覆蓋並同步');
        exitEditor();
      } else {
        const makeCopy = confirm(
          '要另存為副本嗎？\n\n' +
          '按「確定」→ 另存為「' + title + ' 的副本」\n' +
          '按「取消」→ 回到編輯畫面，不做任何變更'
        );
        if (makeCopy) {
          const copy = {
            id: genId(),
            title: title + ' 的副本',
            body,
            media: [...(notes.find(n => n.id === currentNoteId)?.media || [])],
            createdAt: now,
            updatedAt: now,
            deleted: false
          };
          notes.unshift(copy);
          saveLocal();
          showSaving('上傳副本…');
          await pushToDrive();
          hideSaving();
          showToast('已另存為副本');
          exitEditor();
        } else {
          // 取消：回到編輯畫面，什麼都不做
          hideSaving();
          setSyncState('ok');
          return;
        }
      }
    } else {
      // 無衝突：直接存並推
      commitSaveLocal(title, body, now);
      showSaving('上傳中…');
      await pushToDrive();
      hideSaving();
      showToast('已儲存並同步');
      exitEditor();
    }
  } catch(e) {
    hideSaving();
    setSyncState('error');
    showToast('同步失敗，資料已存在本地');
    console.error('saveNote error:', e);
  }
}

// 把修改寫進本地 notes
function commitSaveLocal(title, body, now) {
  if (currentNoteId) {
    const note = notes.find(n => n.id === currentNoteId);
    if (note) { note.title = title; note.body = body; note.updatedAt = now; }
    baselineTimes[currentNoteId] = now;
  } else {
    const newNote = { id: genId(), title, body, media: [], createdAt: now, updatedAt: now };
    notes.unshift(newNote);
    currentNoteId = newNote.id;
    baselineTimes[newNote.id] = now;
  }
  saveLocal();
}

// 儲存完成後退出編輯畫面
function exitEditor() {
  document.getElementById('editorPanel').classList.remove('open');
  currentNoteId = null;
  originalNote = null;
  noteDirty = false;
  renderList();
}

// ── 定時檢查（30秒）+ 切回頁面時觸發 ──
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pullAndMerge, 30000);
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && driveConnected) pullAndMerge();
});

// ── 鍵盤快捷鍵 ──
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); openEditor(null); }
  if (e.key === 'Escape' && document.getElementById('editorPanel').classList.contains('open')) { closeEditor(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

// ── TipTap 工具列函數 ──
function setHeading(level) {
  if (!editor) return;
  const l = parseInt(level);
  if (l === 0) editor.chain().focus().setParagraph().run();
  else editor.chain().focus().toggleHeading({ level: l }).run();
}

function insertTable() {
  if (!editor) return;
  document.getElementById('tableRows').value = 3;
  document.getElementById('tableCols').value = 3;
  document.getElementById('tableModalBg').classList.add('open');
  setTimeout(() => document.getElementById('tableRows').focus(), 100);
}

function closeTableModal() {
  document.getElementById('tableModalBg').classList.remove('open');
  editor && editor.commands.focus();
}

function confirmInsertTable() {
  const rows = parseInt(document.getElementById('tableRows').value) || 3;
  const cols = parseInt(document.getElementById('tableCols').value) || 3;
  const safeRows = Math.min(Math.max(rows, 1), 20);
  const safeCols = Math.min(Math.max(cols, 1), 20);
  editor.chain().focus().insertTable({ rows: safeRows, cols: safeCols, withHeaderRow: true }).run();
  closeTableModal();
}

// ── 表格右鍵選單 ──
let ctxOpen = false;

function openCtxMenu(e) {
  if (!editor) return;
  // 只在表格內才顯示
  const isInTable = editor.isActive('table') ||
    e.target.closest('table');
  if (!isInTable) return;
  e.preventDefault();
  const menu = document.getElementById('ctxMenu');
  const x = Math.min(e.clientX, window.innerWidth - 200);
  const y = Math.min(e.clientY, window.innerHeight - 280);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('open');
  ctxOpen = true;
}

function closeCtxMenu() {
  document.getElementById('ctxMenu').classList.remove('open');
  ctxOpen = false;
}

function tableCmd(cmd) {
  if (!editor) return;
  closeCtxMenu();
  const cmdMap = {
    addRowBefore: () => editor.chain().focus().addRowBefore().run(),
    addRowAfter:  () => editor.chain().focus().addRowAfter().run(),
    deleteRow:    () => editor.chain().focus().deleteRow().run(),
    addColumnBefore: () => editor.chain().focus().addColumnBefore().run(),
    addColumnAfter:  () => editor.chain().focus().addColumnAfter().run(),
    deleteColumn:    () => editor.chain().focus().deleteColumn().run(),
    deleteTable:     () => editor.chain().focus().deleteTable().run(),
  };
  cmdMap[cmd]?.();
}

// 綁定右鍵事件到編輯區
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('editor').addEventListener('contextmenu', openCtxMenu);
});

// 點其他地方關閉選單
document.addEventListener('click', (e) => {
  if (ctxOpen && !e.target.closest('#ctxMenu')) closeCtxMenu();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && ctxOpen) closeCtxMenu();
});

function updateToolbar() {
  if (!editor) return;
  const btns = ['bold','italic','bulletList','orderedList','blockquote'];
  btns.forEach(name => {
    const btn = document.getElementById('btn-' + name);
    if (btn) btn.classList.toggle('active', editor.isActive(name));
  });
  const sel = document.getElementById('headingSelect');
  if (sel) {
    if (editor.isActive('heading', { level: 1 })) sel.value = '1';
    else if (editor.isActive('heading', { level: 2 })) sel.value = '2';
    else if (editor.isActive('heading', { level: 3 })) sel.value = '3';
    else sel.value = '0';
  }
}

// ── 初始化 ──
loadLocal();
renderList();

// 初始化 TipTap
function initEditor() {
  if (!window._tiptapReady) { setTimeout(initEditor, 100); return; }
  const { Editor, StarterKit, TextStyle, Color, Table, TableRow, TableHeader, TableCell } = window._tiptapModules;

  editor = new Editor({
    element: document.getElementById('editor'),
    extensions: [
      StarterKit,
      TextStyle,
      Color,
      Table.configure({ resizable: true }),
      TableRow,
      TableHeader,
      TableCell,
    ],
    content: '',
    editorProps: {
      attributes: {
        'data-placeholder': '開始記錄…',
      }
    },
    onUpdate: () => {
      debounceSave();
      updateCharCount();
      updateToolbar();
    },
    onSelectionUpdate: () => { updateToolbar(); }
  });
}
initEditor();


</script>
